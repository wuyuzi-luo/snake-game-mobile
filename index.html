<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; touch-action: manipulation; }
body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh;
       font-family: "Microsoft YaHei","PingFang SC",sans-serif; user-select: none; -webkit-user-select: none; }
#container { display: flex; gap: 10px; padding: 10px; align-items: flex-start; }
canvas { display: block; border: 1px solid #333; max-width: 100%; height: auto; touch-action: none; }
#panel { width: 195px; min-width: 195px; background: #0a0a0a; display: flex; flex-direction: column; padding: 20px 12px; gap: 10px; color: #fff; }
#panel .title { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 8px; }
#panel .info { font-family: "Consolas","Microsoft YaHei",monospace; font-size: 13px; padding: 2px 0; }
#panel .score { color: #00ff88; }
#panel .speed { color: #ffaa00; }
#panel .progress { color: #777; font-size: 11px; }
#panel .boost { color: #ff6600; font-weight: bold; min-height: 16px; }
#panel .combo { color: #ffaa00; font-weight: bold; min-height: 16px; }
#panel .lives { color: #44aaff; }
#panel .inv { color: #cc44ff; min-height: 16px; }
#panel .skin-info { color: #888; font-size: 10px; }
#boost-btn { display: none; position: fixed; bottom: 58px; left: 14px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,102,0,0.28); border: 2.5px solid rgba(255,102,0,0.5); color: rgba(255,255,255,0.9); font-size: 17px; font-weight: bold; font-family: "Microsoft YaHei","PingFang SC",sans-serif; z-index: 10; touch-action: none; cursor: pointer; justify-content: center; align-items: center; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
#boost-btn:active, #boost-btn.pressed { background: rgba(255,102,0,0.7); border-color: #ff6600; transform: scale(0.95); }

/* Mobile responsive -- portrait-first, max canvas size */
@media (max-width: 960px) {
    #boost-btn { display: flex; }
    body { align-items: center; background: #050505; }
    #container { flex-direction: column; align-items: center; padding: 0; gap: 0; justify-content: center; height: 100dvh; }
    canvas { width: 100vw; height: auto; max-width: 750px; border: none; border-radius: 0; }
    #panel { width: 100vw; max-width: 750px; min-width: auto; flex-direction: row; flex-wrap: nowrap; padding: 6px 14px; gap: 0; justify-content: space-between; align-items: center; background: #0d0d0d; border-top: 1px solid #1a1a1a; min-height: 42px; }
    #panel .title { font-size: 15px; margin-bottom: 0; color: #bbb; }
    #panel .info { font-size: 11px; padding: 0; }
    #panel .boost, #panel .combo, #panel .inv, #panel .skin-info { display: none; }
    #panel .progress { font-size: 10px; opacity: 0.7; }
}


</style>
</head>
<body>
<div id="container">
    <canvas id="game"></canvas>
    <button id="boost-btn">加速</button>
    <div id="panel">
        <div class="title">贪吃蛇</div>
        <div class="info score" id="score">分数: 0</div>
        <div class="info speed" id="speed">速度: 等级 1</div>
        <div class="info progress" id="progress">进度: [░░░] 0/3</div>
        <div class="info boost" id="boost"></div>
        <div class="info combo" id="combo"></div>
        <div class="info lives" id="lives"></div>
        <div class="info inv" id="inv"></div>
        <div class="info skin-info" id="skinInfo">皮肤: 经典绿</div>
    </div>
</div>

<script>
// ============================ CONSTANTS ============================
const CELL=30, COLS=25, ROWS=20, CW=COLS*CELL, CH=ROWS*CELL;
const BASE_SPEED=180, MIN_SPEED=70, SPEED_STEP=5, FOODS_PER_LEVEL=3, INITIAL_MARGIN=5, INVINCIBLE_SECS=5;
const BG="#FFF8E7", GRID="#E8E4D8", OVERLAY="#FFF8E7", MENU_BG="#080808", TEXT="#ffffff", SUBTEXT="#888888";
const BTN_BG="#1a3a1a", BTN_HOVER="#2a6a2a", BTN_BD="#3a6a3a", BTN_BD_H="#4a8a4a";
const FOOD_COLORS={normal:"#ff3366",big:"#ffd700",shield:"#44aaff",star:"#cc44ff"};
const GLOW_COLORS={normal:"#ff8899",big:"#ffcc44",shield:"#88ccff",star:"#dd88ff"};
const SKINS={
    "经典绿":{head:"#00cc44",tail:"#006622",accent:"#00ff88"},
    "烈焰红":{head:"#ff4422",tail:"#991100",accent:"#ff6644"},
    "冰霜蓝":{head:"#44ccff",tail:"#115588",accent:"#44ccff"},
    "霓虹紫":{head:"#ff44ff",tail:"#880088",accent:"#ff66ff"},
    "暗金":  {head:"#ffd700",tail:"#886600",accent:"#ffd700"},
};

const canvas=document.getElementById('game'); canvas.width=CW; canvas.height=CH;
const ctx=canvas.getContext('2d');

// ============================ AUDIO ============================
let audioCtx=null, sounds={}, bgmNode=null, bgmResumeId=null, soundOn=true;

function initAudio(){ if(audioCtx)return; audioCtx=new(window.AudioContext||window.webkitAudioContext)(); sounds=generateSounds(); }
function midiToFreq(n){ return 440*Math.pow(2,(n-69)/12); }

function createBuffer(dur,sr,gen){
    const n=Math.floor(sr*dur), buf=audioCtx.createBuffer(1,n,sr), d=buf.getChannelData(0);
    for(let i=0;i<n;i++){ let v=gen(i/sr); d[i]=Math.max(-0.95,Math.min(0.95,v)); }
    return buf;
}
function generateSounds(){
    const sr=11025,s={};
    s.eat=createBuffer(0.10,sr,t=>{ let d=0.10,f=440+440*(t/d); return Math.max(0,1-t/d)*0.55*Math.sin(2*Math.PI*f*t); });
    s.shield=createBuffer(0.15,sr,t=>{ let d=0.15,f=520+360*(t/d),e=Math.max(0,1-t/d); return e*0.45*Math.sin(2*Math.PI*f*t)+e*0.15*Math.sin(2*Math.PI*f*1.5*t); });
    s.star=createBuffer(0.20,sr,t=>{ let d=0.20,n=[60,64,67,72,76],nd=d/5,i=Math.min(Math.floor(t/nd),4),f=midiToFreq(n[i]),e=Math.max(0,1-(t%nd)/nd*0.7); return e*0.4*Math.sin(2*Math.PI*f*t)+e*0.2*Math.sin(2*Math.PI*f*2*t); });
    s.die=createBuffer(0.50,sr,t=>{ let d=0.50,f=400-250*(t/d),e=Math.max(0,1-t/d); return e*0.4*Math.sin(2*Math.PI*f*t)+e*0.25*(Math.random()*2-1); });
    s.levelup=createBuffer(0.35,sr,t=>{ let d=0.35,n=[523,659,784,1047],nd=d/4,i=Math.min(Math.floor(t/nd),3),f=n[i],lt=t%nd; return Math.max(0,1-lt/nd*0.6)*0.45*Math.sin(2*Math.PI*f*t); });
    s.turn=createBuffer(0.06,sr,t=>{ let d=0.06,f=600+200*(t/d),e=Math.max(0,1-t/d); return e*0.25*Math.sin(2*Math.PI*f*t)+(Math.random()*2-1)*0.3*e*e; });
    s.bgm=createBuffer(4.05,sr,t=>{ let bpm=120,beat=60/bpm,mel=[60,0,0.8,64,1,0.4,67,1.5,0.4,72,2,0.8,71,3,0.4,72,3.5,0.4,67,4,0.8,64,5,0.8,62,6,0.8,64,7,0.4,67,7.5,0.4],bas=[48,0,4,48,4,4],melV=0,basV=0;
        for(let j=0;j<mel.length;j+=3){ let s=mel[j+1]*beat,e=(mel[j+1]+mel[j+2])*beat; if(s<=t&&t<e){ let f=midiToFreq(mel[j]),lt=t-s,env=1; if(lt<0.015)env=lt/0.015; if(lt>mel[j+2]*beat-0.02)env=Math.max(0,(mel[j+2]*beat-lt)/0.02); let ph=lt*f; melV=env*(((ph%1)<0.25)?0.15:-0.15); break; } }
        for(let j=0;j<bas.length;j+=3){ let s=bas[j+1]*beat,e=(bas[j+1]+bas[j+2])*beat; if(s<=t&&t<e){ let f=midiToFreq(bas[j]),ph=(t-s)*f; basV=0.10*(2*Math.abs(2*(ph-Math.floor(ph+0.5)))-1); break; } }
        return melV+basV; });
    return s;
}
function playBuffer(buf){ if(!audioCtx||!soundOn)return; let s=audioCtx.createBufferSource(); s.buffer=buf; s.connect(audioCtx.destination); s.start(0); }
function playSFX(name){
    if(!audioCtx||!soundOn)return; let buf=sounds[name]; if(!buf)return;
    if(bgmNode)stopBGM(); playBuffer(buf);
    if(bgmNode){ if(bgmResumeId)clearTimeout(bgmResumeId); bgmResumeId=setTimeout(resumeBGM,250); }
}
function startBGM(){ if(!audioCtx||!soundOn||bgmNode)return; let s=audioCtx.createBufferSource(); s.buffer=sounds.bgm; s.loop=true; s.connect(audioCtx.destination); s.start(0); bgmNode=s; }
function resumeBGM(){ bgmResumeId=null; if(!soundOn||!bgmNode)return; startBGM(); }
function stopBGM(){ if(bgmResumeId){ clearTimeout(bgmResumeId); bgmResumeId=null; } if(bgmNode){ try{bgmNode.stop();}catch(e){} bgmNode=null; } }

// ============================ HISTORY ============================
function loadHistory(){ try{ let d=localStorage.getItem('snake_scores'); return d?JSON.parse(d):[]; }catch(e){ return []; } }
function saveHistoryDirect(h){ localStorage.setItem('snake_scores',JSON.stringify(h)); }
function saveScore(score,level,nickname){
    let h=loadHistory(), now=new Date();
    let date=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    h.push({player:nickname||"玩家",score,level,date}); h.sort((a,b)=>b.score-a.score);
    localStorage.setItem('snake_scores',JSON.stringify(h.slice(0,10)));
}

// ============================ GAME STATE ============================
let state='menu', snake, dir, nextDir, dirQueue, score, eaten, speed, boost, lives, invincibleUntil, foodMargin;
let foods, maxFoods, combo, lastEatTime, enemy, enemyDir, enemyTick, obstacles, shakeUntil;
let paused, countdown, countdownTimer, skin, nickname;
let particles=[], popups=[], trail=[], buttons=[], hovered=null;
let lastTick=0;

function initData(){
    let cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
    snake=[[cx-2,cy],[cx-1,cy],[cx,cy]]; dir=[1,0]; nextDir=[1,0]; dirQueue=[];
    score=0; eaten=0; speed=BASE_SPEED; boost=false; lives=0; invincibleUntil=0; foodMargin=INITIAL_MARGIN;
    foods=[]; maxFoods=3; combo=0; lastEatTime=0; enemy=[]; enemyDir=[0,1]; enemyTick=0; obstacles=new Set();
    shakeUntil=0; paused=false; countdown=-1; countdownTimer=0;
    particles=[]; popups=[]; trail=[];
}

function skinColors(){ let s=SKINS[skin]||SKINS["经典绿"]; return [s.head,s.tail,s.accent]; }

function placeOneFood(){
    let m=foodMargin, occupied=new Set([...snake.map(p=>p[0]+','+p[1]),...enemy.map(p=>p[0]+','+p[1]),...obstacles]);
    for(let f of foods) occupied.add(f[0]+','+f[1]);
    let x,y; do{ x=Math.floor(Math.random()*(COLS-2*m))+m; y=Math.floor(Math.random()*(ROWS-2*m))+m; }while(occupied.has(x+','+y));
    let r=Math.random(), type;
    if(r<0.05)type='star'; else if(r<0.15)type='shield'; else if(r<0.30)type='big'; else type='normal';
    return [x,y,type];
}
function ensureFoods(){ while(foods.length<maxFoods) foods.push(placeOneFood()); }
function speedLevel(){ return Math.floor((BASE_SPEED-speed)/SPEED_STEP)+1; }
function syncInfo(){
    document.getElementById('score').textContent=`分数: ${score}`;
    document.getElementById('speed').textContent=`速度: 等级 ${speedLevel()}`;
    let prog=eaten%FOODS_PER_LEVEL;
    document.getElementById('progress').textContent=`进度: [${'█'.repeat(prog)}${'░'.repeat(FOODS_PER_LEVEL-prog)}] ${prog}/${FOODS_PER_LEVEL}`;
    document.getElementById('boost').textContent=(boost&&state==='play')?'加速中!':'';
    document.getElementById('combo').textContent=combo>=2?`连击 x${combo}!`:'';
    document.getElementById('lives').textContent=lives>0?`生命: ${'♥'.repeat(lives)}`:'';
    if(state==='play'&&Date.now()/1000<invincibleUntil) document.getElementById('inv').textContent=`无敌: ${Math.ceil(invincibleUntil-Date.now()/1000)}秒`;
    else document.getElementById('inv').textContent='';
    document.getElementById('skinInfo').textContent=`皮肤: ${skin}`;
}

// ============================ INPUT ============================
const keyDir={arrowup:[0,-1],arrowdown:[0,1],arrowleft:[-1,0],arrowright:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
function steer(key){ let k=key.toLowerCase(), nd=keyDir[k]; if(!nd)return; if(nd[0]+dir[0]===0&&nd[1]+dir[1]===0)return; if(dirQueue.length>0&&dirQueue[dirQueue.length-1][0]===nd[0]&&dirQueue[dirQueue.length-1][1]===nd[1])return; if(dirQueue.length<2)dirQueue.push(nd); }

document.addEventListener('keydown',e=>{
    initAudio(); let k=e.key.toLowerCase();
    if(k==='m'){ soundOn=!soundOn; if(soundOn&&state==='menu')startBGM(); else{stopBGM();bgmNode=null;} return; }
    if(state==='countdown')return;
    if(state==='play'){
        if(k==='p'){ paused=!paused; if(paused)stopBGM(); else startBGM(); draw(); return; }
        if(k==='r'){ startGame(); return; } if(k==='q'){ window.close(); return; }
        if(paused)return; if(k===' '){ e.preventDefault(); boost=true; spaceHeld=true; return; }
        steer(e.key);
    }else if(state==='over'){ if(k==='r')startGame(); if(k==='q')window.close(); }
    else if(state==='rules'||state==='history'||state==='skins'){ if(k==='escape')goMenu(); }
    else if(state==='menu'){ if(k==='escape')window.close(); }
});
document.addEventListener('keyup',e=>{ if(e.key===' '){ boost=false; spaceHeld=false; } });

// ============================ MOBILE TOUCH CONTROLS ============================
// Swipe anywhere on canvas = steer; dedicated boost button handles acceleration
let touchWasSwipe=false, isBoostFromTouch=false, lastSteerPos=null, spaceHeld=false;

canvas.addEventListener('touchstart',e=>{
    initAudio(); touchWasSwipe=false;
    if(e.touches.length===1){
        lastSteerPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
    }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!lastSteerPos||e.touches.length!==1)return;
    touchWasSwipe=true;
    if(state==='play'&&!paused){
        let sdx=e.touches[0].clientX-lastSteerPos.x, sdy=e.touches[0].clientY-lastSteerPos.y;
        if(Math.abs(sdx)>20||Math.abs(sdy)>20){
            if(Math.abs(sdx)>Math.abs(sdy))steer(sdx>0?'ArrowRight':'ArrowLeft');
            else steer(sdy>0?'ArrowDown':'ArrowUp');
            lastSteerPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
        }
    }
},{passive:false});

canvas.addEventListener('touchend',e=>{ lastSteerPos=null; });
canvas.addEventListener('touchcancel',e=>{ lastSteerPos=null; });

// Dedicated boost button
const boostBtn=document.getElementById('boost-btn');
boostBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); if(state==='play'&&!paused){ boost=true; isBoostFromTouch=true; } });
boostBtn.addEventListener('pointerup',e=>{ if(isBoostFromTouch&&!spaceHeld){ boost=false; isBoostFromTouch=false; } });
boostBtn.addEventListener('pointerleave',e=>{ if(isBoostFromTouch&&!spaceHeld){ boost=false; isBoostFromTouch=false; } });

// Canvas click (works for both mouse and touch)
canvas.addEventListener('click',e=>{
    initAudio();
    if(touchWasSwipe){ touchWasSwipe=false; return; }
    let rect=canvas.getBoundingClientRect();
    let scaleX=CW/rect.width, scaleY=CH/rect.height;
    let mx=(e.clientX-rect.left)*scaleX, my=(e.clientY-rect.top)*scaleY;
    for(let btn of buttons){
        if(mx>=btn.x1&&mx<=btn.x2&&my>=btn.y1&&my<=btn.y2){
            if(btn.action==='start')startGame(); else if(btn.action==='rules')showRules();
            else if(btn.action==='history')showHistory(); else if(btn.action==='skins')showSkins();
            else if(btn.action==='nickname'){ let n=prompt('输入你的昵称:'); if(n&&n.trim())nickname=n.trim(); }
            else if(btn.action.startsWith('del_')){ let idx=parseInt(btn.action.slice(4)); let h=loadHistory(); if(idx>=0&&idx<h.length){ h.splice(idx,1); saveHistoryDirect(h); } draw(); }
            else if(btn.action.startsWith('skin_')){ skin=btn.action.slice(5); goMenu(); }
            else if(btn.action==='quit')window.close(); else if(btn.action==='back')goMenu();
            else if(btn.action==='restart')startGame(); else if(btn.action==='menu')goMenu();
            return;
        }
    }
    if(state==='rules'||state==='history'||state==='skins')goMenu();
});
canvas.addEventListener('mousemove',e=>{
    let rect=canvas.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top, h=null;
    let scaleX=CW/rect.width, scaleY=CH/rect.height;
    mx*=scaleX; my*=scaleY;
    for(let btn of buttons){ if(mx>=btn.x1&&mx<=btn.x2&&my>=btn.y1&&my<=btn.y2){ h=btn.action; break; } }
    if(h!==hovered){ hovered=h; draw(); }
});

// ============================ ACTIONS ============================
function startGame(){ stopBGM(); initData(); ensureFoods(); state='countdown'; countdown=3; countdownTimer=performance.now()/1000; syncInfo(); draw(); }
function showRules(){ stopBGM(); state='rules'; draw(); }
function showHistory(){ stopBGM(); state='history'; draw(); }
function showSkins(){ stopBGM(); state='skins'; draw(); }
function goMenu(){ stopBGM(); initData(); foods=[placeOneFood()]; state='menu'; syncInfo(); draw(); startBGM(); }

// ============================ UPDATE ============================
function update(){
    let oldDir=dir.slice();
    if(dirQueue.length>0) nextDir=dirQueue.shift();
    dir=nextDir.slice();
    if(dir[0]!==oldDir[0]||dir[1]!==oldDir[1]) playSFX('turn');

    let hx=snake[snake.length-1][0], hy=snake[snake.length-1][1];
    let nhx=hx+dir[0], nhy=hy+dir[1], inv=Date.now()/1000<invincibleUntil;

    if(nhx<0||nhx>=COLS||nhy<0||nhy>=ROWS){ if(inv){ nhx=((nhx%COLS)+COLS)%COLS; nhy=((nhy%ROWS)+ROWS)%ROWS; } else { die(); return; } }
    if(snake.some(s=>s[0]===nhx&&s[1]===nhy)){ if(!inv){ die(); return; } }
    if(enemy.some(s=>s[0]===nhx&&s[1]===nhy)){ if(!inv){ die(); return; } }
    if(obstacles.has(nhx+','+nhy)){ if(!inv){ die(); return; } }

    snake.push([nhx,nhy]); trail.push([hx,hy]); if(trail.length>5) trail.shift();

    // eat food
    let eatenIdx=-1;
    for(let i=0;i<foods.length;i++){ if(nhx===foods[i][0]&&nhy===foods[i][1]){ eatenIdx=i; break; } }
    if(eatenIdx>=0){
        let [fx,fy,ftype]=foods.splice(eatenIdx,1)[0]; eaten++; let prevLevel=speedLevel(), now=Date.now()/1000;
        if(now-lastEatTime<1.5)combo++; else combo=1; lastEatTime=now; let mult=combo;

        if(ftype==='normal'){ score+=10*mult; playSFX('eat'); spawnParticles(fx,fy,'#ff3366'); spawnPopup(fx,fy,'+'+10*mult,'#ff3366'); }
        else if(ftype==='big'){ score+=30*mult; playSFX('eat'); spawnParticles(fx,fy,'#ffd700'); spawnPopup(fx,fy,'+'+30*mult,'#ffd700'); }
        else if(ftype==='shield'){ lives++; playSFX('shield'); spawnParticles(fx,fy,'#44aaff'); spawnPopup(fx,fy,'护盾+1','#44aaff'); }
        else if(ftype==='star'){ invincibleUntil=Date.now()/1000+INVINCIBLE_SECS; playSFX('star'); spawnParticles(fx,fy,'#cc44ff'); spawnPopup(fx,fy,'无敌!','#cc44ff'); }
        if(combo>=3) spawnPopup(fx,fy,'COMBO x'+combo+'!','#ffaa00');

        if(eaten%FOODS_PER_LEVEL===0){
            if(speed>MIN_SPEED) speed=Math.max(MIN_SPEED,speed-SPEED_STEP);
            if(foodMargin>1) foodMargin--;
            if(speedLevel()>prevLevel) playSFX('levelup');
            maxFoods=Math.min(6,3+Math.floor(speedLevel()/2));
        }
        ensureFoods();
    }else{ snake.shift(); }

    // enemy AI (every 2 ticks)
    enemyTick++; if(enemyTick%2===0&&enemy.length>0) moveEnemy();

    // obstacles
    let lv=speedLevel();
    if(lv>=3){ let count=lv*2; if(obstacles.size!==count) generateObstacles(count); }
}

function moveEnemy(){
    if(enemy.length===0)return;
    let [ehx,ehy]=enemy[enemy.length-1], dx, dy;
    if(foods.length>0){
        let closest=foods.reduce((a,b)=>Math.abs(a[0]-ehx)+Math.abs(a[1]-ehy)<Math.abs(b[0]-ehx)+Math.abs(b[1]-ehy)?a:b);
        dx=closest[0]>ehx?1:(closest[0]<ehx?-1:0); dy=closest[1]>ehy?1:(closest[1]<ehy?-1:0);
        if(dx!==0&&dy!==0){ if(Math.abs(closest[0]-ehx)>=Math.abs(closest[1]-ehy))dy=0; else dx=0; }
        if(dx===0&&dy===0)[dx,dy]=enemyDir;
    }else{ [dx,dy]=enemyDir; }

    for(let [ndx,ndy] of [[dx,dy],[dy,dx],[-dy,-dx],[-dx,-dy],[1,0],[-1,0],[0,1],[0,-1]]){
        let nx=ehx+ndx, ny=ehy+ndy;
        if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&!enemy.some(s=>s[0]===nx&&s[1]===ny)&&!obstacles.has(nx+','+ny)){ enemyDir=[ndx,ndy]; break; }
    }
    let nhx=ehx+enemyDir[0], nhy=ehy+enemyDir[1];
    if(nhx<0||nhx>=COLS||nhy<0||nhy>=ROWS)return;
    if(enemy.some(s=>s[0]===nhx&&s[1]===nhy))return;
    if(obstacles.has(nhx+','+nhy))return;
    enemy.push([nhx,nhy]);
    let ateIdx=-1;
    for(let i=0;i<foods.length;i++){ if(nhx===foods[i][0]&&nhy===foods[i][1]){ ateIdx=i; break; } }
    if(ateIdx>=0){ let f=foods.splice(ateIdx,1)[0]; spawnParticles(f[0],f[1],'#ff6600',6); ensureFoods(); }
    else enemy.shift();
    if(enemy.length===0)initEnemy();
}
function initEnemy(){
    let x,y; do{ x=Math.floor(Math.random()*(COLS-10))+5; y=Math.floor(Math.random()*(ROWS-10))+5; }while(snake.some(s=>s[0]===x&&s[1]===y));
    enemy=[[x-2,y],[x-1,y],[x,y]]; enemyDir=[1,0];
}
function generateObstacles(count){
    obstacles.clear(); let occupied=new Set([...snake.map(p=>p[0]+','+p[1]),...enemy.map(p=>p[0]+','+p[1])]);
    for(let f of foods) occupied.add(f[0]+','+f[1]);
    for(let a=0;a<500&&obstacles.size<count;a++){
        let x=Math.floor(Math.random()*(COLS-2))+1, y=Math.floor(Math.random()*(ROWS-2))+1;
        if(!occupied.has(x+','+y)){ obstacles.add(x+','+y); occupied.add(x+','+y); }
    }
}

function drawPixelSnake(){
    let ps=10, thick=4;
    function line(c1,r1,c2,r2){ let p=[]; if(c1===c2){ let s=r2>=r1?1:-1; for(let r=r1;s>0?r<=r2:r>=r2;r+=s)p.push([c1,r]); }else{ let s=c2>=c1?1:-1; for(let c=c1;s>0?c<=c2:c>=c2;c+=s)p.push([c,r1]); } return p; }
    let segs=[[0,52,60,52],[60,52,60,44],[60,44,6,44],[6,44,6,36],[6,36,58,36],[58,36,58,28],[58,28,10,28],[10,28,10,20],[10,20,56,20],[56,20,56,12],[56,12,14,12],[14,12,14,6],[14,6,20,6]];
    let cl=[]; for(let[s1,r1,s2,r2]of segs){ let sp=line(s1,r1,s2,r2); if(cl.length&&sp.length&&sp[0][0]===cl[cl.length-1][0]&&sp[0][1]===cl[cl.length-1][1])cl.push(...sp.slice(1)); else cl.push(...sp); }
    let filled=new Set(), half=Math.floor(thick/2);
    for(let[c,r]of cl){ for(let dc=-half;dc<=half;dc++)for(let dr=-half;dr<=half;dr++)filled.add((c+dc)+','+(r+dr)); }
    let ox=18, oy=20;
    for(let s of filled){ let[c,r]=s.split(',').map(Number); ctx.fillStyle=(c+r)%3===0?'#0d1f0d':'#0a1a0a'; ctx.fillRect(ox+c*ps,oy+r*ps,ps,ps); }
    let[hc,hr]=cl[cl.length-1];
    ctx.fillStyle='#0f2a0f'; for(let dc=-2;dc<=3;dc++)for(let dr=-2;dr<=2;dr++)ctx.fillRect(ox+(hc+dc)*ps,oy+(hr+dr)*ps,ps,ps);
    let hx=ox+(hc+2)*ps, hy2=oy+(hr-1)*ps;
    ctx.fillStyle='#1a4a1a'; ctx.beginPath();ctx.arc(hx+4,hy2+3,2.5,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(hx+10,hy2+3,2.5,0,Math.PI*2);ctx.fill();
}

function drawGame(sx,sy){

    // obstacles
    for(let key of obstacles){ let[ox,oy]=key.split(',').map(Number); ctx.fillStyle='#aa2222'; ctx.fillRect(ox*CELL+4+sx,oy*CELL+4+sy,CELL-8,CELL-8); ctx.strokeStyle='#cc4444'; ctx.lineWidth=2; ctx.strokeRect(ox*CELL+4+sx,oy*CELL+4+sy,CELL-8,CELL-8); }

function drawOneFood(fx,fy,ftype,sx=0,sy=0){

    else { let r=(CELL/2-(ftype==='big'?1:3))*breathe; ctx.fillStyle=fill; ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill(); }
}
function drawStar(cx,cy,r,color){

function drawSnake(inv,sx=0,sy=0){
    let[headC,tailC]=skinColors(), n=snake.length;
    for(let i=0;i<n;i++){
        let[ssx,ssy]=snake[i], x1=ssx*CELL+2+sx, y1=ssy*CELL+2+sy, x2=(ssx+1)*CELL-2+sx, y2=(ssy+1)*CELL-2+sy;
        let t=n>1?i/(n-1):1;
        let tr=Math.floor(parseInt(tailC.substr(1,2),16)+t*(parseInt(headC.substr(1,2),16)-parseInt(tailC.substr(1,2),16)));
        let tg=Math.floor(parseInt(tailC.substr(3,2),16)+t*(parseInt(headC.substr(3,2),16)-parseInt(tailC.substr(3,2),16)));
        let tb=Math.floor(parseInt(tailC.substr(5,2),16)+t*(parseInt(headC.substr(5,2),16)-parseInt(tailC.substr(5,2),16)));
        let color=`rgb(${tr},${tg},${tb})`; if(inv&&Math.floor(Date.now()/1000*6)%2===0)color='#ff6600';

function drawEyes(hx,hy,sx,sy){

function drawEnemy(sx,sy){

// ============================ GAME LOOP ============================
function gameLoop(ts){
    let delay=(boost&&state==='play'&&!paused)?speed/2:speed;
    if(!lastTick)lastTick=ts;
    if(state==='countdown'){
        if(ts/1000-countdownTimer>=0.7){ countdown--; countdownTimer=ts/1000; if(countdown<0){ state='play'; } }
        syncInfo(); draw(); requestAnimationFrame(gameLoop); return;
    }
    let elapsed=ts-lastTick;
    if(elapsed>=delay){ lastTick=ts-(elapsed%delay); if(state==='play'&&!paused)update(); syncInfo(); }
    draw(); requestAnimationFrame(gameLoop);
}

// ============================ INIT ============================
skin='经典绿'; nickname='';
initData(); foods=[placeOneFood()]; syncInfo(); draw(); startBGM(); requestAnimationFrame(gameLoop);
